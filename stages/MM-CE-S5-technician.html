<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Magicman | The Repair Journey - Stage 5 Dispatch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
  <!-- Shared shell stylesheet. Loaded before this stage's own <style> so the
       stage's bespoke styles win the cascade. -->
  <link rel="stylesheet" href="../css/main.css">
  <script src="../js/main.js" defer></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      background: var(--navy);
      color: var(--white);
      overflow-x: hidden;
      font-family: 'Open Sans', sans-serif;
      margin: 0;
    }

    /* Placeholder layout - MARV centred, text and skip button stacked below. */
    .placeholder {
      min-height: calc(100vh - 60px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 40px 24px;
      text-align: center;
    }

    /* MARV sprite reuses the shared .marv-sprite circuit-trace glow border. */
    .placeholder .marv-sprite {
      width: 200px;
      height: 250px;
    }

    .placeholder__text {
      color: var(--wasabi);
      font-size: 28px;
      font-weight: 700;
      margin: 0;
    }
  </style>
</head>
<body>

  <!-- Progress indicator - 7 stages, Stage 5 Dispatch active. Class only,
       no id="progress-steps", so the shell's main.js never re-renders it. -->
  <header class="progress-bar" aria-label="Journey progress">
    <div class="progress-bar__inner">
      <img class="progress-bar__logo" src="../assets/images/magicman-white.png" alt="Magicman">
      <ol class="progress-steps">
        <li class="progress-step is-complete"><span class="progress-step__dot"></span><span class="progress-step__label">1. Claim</span></li>
        <li class="progress-step is-complete"><span class="progress-step__dot"></span><span class="progress-step__label">2. The Decision Gap</span></li>
        <li class="progress-step is-complete"><span class="progress-step__dot"></span><span class="progress-step__label">3. The New Way</span></li>
        <li class="progress-step is-complete"><span class="progress-step__dot"></span><span class="progress-step__label">4. Assessment</span></li>
        <li class="progress-step is-active" aria-current="step"><span class="progress-step__dot"></span><span class="progress-step__label">5. Dispatch</span></li>
        <li class="progress-step"><span class="progress-step__dot"></span><span class="progress-step__label">6. Repair</span></li>
        <li class="progress-step"><span class="progress-step__dot"></span><span class="progress-step__label">7. Outcome</span></li>
      </ol>
    </div>
  </header>

  <main class="placeholder">
    <img class="marv-sprite" src="../assets/marv/marvthinking.png" alt="MARV looking thoughtful">
    <p class="placeholder__text">In development</p>
    <a class="btn btn-primary" href="MM-CE-S6-repair.html">Skip</a>
  </main>

</body>
</html>
